<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">MCPK icon</title>
  <desc id="desc">A compact Minecraft-style PK protection icon with shield, beam, and glowing ring.</desc>
  <defs>
    <radialGradient id="grass" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#7df35a"/>
      <stop offset="1" stop-color="#14823b"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff8cff"/>
      <stop offset=".45" stop-color="#fff"/>
      <stop offset="1" stop-color="#8e4dff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffef64"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="10" fill="#10283f"/>
  <path d="M0 76 64 40l64 36-64 36Z" fill="url(#grass)"/>
  <path d="M18 76 64 50l46 26-46 26Z" fill="none" stroke="#58ffef" stroke-width="2" opacity=".8"/>
  <ellipse cx="64" cy="83" rx="36" ry="20" fill="none" stroke="#ffe44a" stroke-width="4" filter="url(#glow)"/>
  <ellipse cx="64" cy="83" rx="25" ry="14" fill="none" stroke="#ff8c27" stroke-width="2"/>

  <path d="M59 22h10v72H59Z" fill="url(#beam)" opacity=".9" filter="url(#glow)"/>
  <path d="M54 65h20v10H54Z" fill="#fff" filter="url(#glow)"/>
  <path d="M59 60h10v20H59Z" fill="#fff" filter="url(#glow)"/>

  <path d="M47 28 64 20l17 8v18c0 13-8 20-17 24-9-4-17-11-17-24Z" fill="url(#shield)" stroke="#fff" stroke-width="3"/>
  <text x="64" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">PK</text>

  <g fill="#1b2d59">
    <rect x="57" y="79" width="16" height="22" rx="2"/>
    <rect x="53" y="88" width="24" height="10" rx="1"/>
  </g>
  <rect x="60" y="74" width="10" height="9" fill="#f6c7a4"/>
  <rect x="57" y="72" width="16" height="6" fill="#202243"/>

  <g stroke-linecap="round" filter="url(#glow)">
    <path d="M20 20 45 48" stroke="#ffcf42" stroke-width="3"/>
    <path d="M107 15 86 48" stroke="#ff7cff" stroke-width="3"/>
    <path d="M116 68 92 75" stroke="#ff7cff" stroke-width="3"/>
    <path d="M19 103 41 88" stroke="#58ffef" stroke-width="3"/>
  </g>

  <g fill="#d98226" stroke="#fff4a8" stroke-width="2">
    <rect x="20" y="89" width="18" height="14" rx="1"/>
    <rect x="93" y="87" width="17" height="13" rx="1"/>
  </g>
</svg>
